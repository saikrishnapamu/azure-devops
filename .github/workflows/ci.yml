name: Customer Service CI

on:
  push:
    branches: [azure-devops-proj]

  pull_request:
    branches: [azure-devops-proj]


jobs:
  build:
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: application/customer-service

    env:
      PYTHONPATH: .

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Verify Python
        run: |
          python --version
          pip --version

      - name: Install Dependecies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Verify Flask Installation
        run: |
          python -c "import flask; print(flask.__version__)"

      - name: Run Unit Test
        run: |
          pytest

      - name: Build Docker Image
        uses: docker/setup-buildx-action@v3

      - name: List docker images
        run: |
          docker images

      - name: Login to Docker HUB
        uses: docker/login-action@v3
        with:
          username: ${{secrets.DOCKER_USERNAME}}
          password: ${{secrets.DOCKER_PASSWORD}}

      - name: Build and Push Docker images
        uses: docker/build-push-action@v6
        with:
          context: ./application/customer-service
          file: ./application/customer-service/Dockerfile
          push: true
          tags: |
            ${{ secrets.DOCKER_USERNAME }}/customer-service:latest
            ${{ secrets.DOCKER_USERNAME }}/customer-service:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Scan Docker Image
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          image-ref: ${{ secrets.DOCKER_USERNAME }}/customer-service:${{ github.sha }}
          format: table
          severity: CRITICAL,HIGH
          exit-code: '1'

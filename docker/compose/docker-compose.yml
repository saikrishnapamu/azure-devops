version: "3.9"

services:
  customer-service:
    build:
      context: ../../application/customer-service
    container_name: customer-service

    ports:
      - "5000:5000"

    environment:
      DB_HOST: postgres
      DB_NAME: customerdb
      DB_USER: admin
      DB_PASSWORD: Admin@123
      REDIS_HOST: redis


    depends_on:
      - postgres
      - redis

    restart: unless-stopped

  postgres:
    image: postgres:17

    container_name: postgres

    environment:
      POSTGRES_DB: customerdb
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: Admin@123
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U admin"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

    volumes:
      - postgres-data:/var/lib/postgresql/data

    restart: unless-stopped


  redis:

    image: redis:8
    container_name: redis
    restart: unless-stopped

volumes:
  postgres-data:

apiVersion: argoproj.io/v1alpha1
kind: Application

metadata:
  name: customer-service
  namespace: argocd

spec: 
  project: default

  source:
    repoURL: https://github.com/saikrishnapamu/azure-devops.git
    targetRevision: azure-devops-proj
    path: helm/customer-service


  destination:
    server: https://kubernetes.default.svc
    namespace: customer-service

  syncPolicy:
    automated:
      prune: true
      selfHeal: true

    syncOptions:
      - CreateNamespace=true
      
